<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Forecasting</title>
</head>
<body>

<h2>Sales Forecasting</h2>

<form method="POST">

<label for="advertising">Advertising Budget</label>
<input 
    type="number"
    step="0.1"
    name="advertising"
    id="advertising"
    placeholder="Enter advertising budget"
    required
>

<br><br>

<label for="price">Product Price</label>
<input 
    type="number"
    step="0.1"
    name="price"
    id="price"
    placeholder="Enter product price"
    required
>

<br><br>

<button type="submit">Predict Sales</button>

</form>

{% if prediction %}
<h3>Predicted Sales: {{ prediction }}</h3>
{% endif %}

</body>
</html>
